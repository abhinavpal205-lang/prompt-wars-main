repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend, strict)
        entry: bash -c 'cd backend && .venv/bin/mypy app tests'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run --silent lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: prettier
        name: prettier check (frontend)
        entry: bash -c 'cd frontend && npm run --silent format:check'
        language: system
        files: ^frontend/.*\.(ts|tsx|css|json)$
        pass_filenames: false
